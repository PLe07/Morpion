<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Hub de Jeux</title>
    <style>
        body { font-family: sans-serif; background: #222; color: white; margin: 0; display: flex; }
        
        /* Menu latéral */
        nav { width: 200px; background: #111; height: 100vh; padding: 20px; border-right: 2px solid #444; }
        nav h2 { color: #4CAF50; font-size: 1.2rem; }
        nav ul { list-style: none; padding: 0; }
        nav li { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; transition: 0.3s; }
        nav li:hover { background: #333; color: #4CAF50; }

        /* Conteneur de jeu */
        main { flex-grow: 1; padding: 20px; display: flex; justify-content: center; align-items: center; }
        .game-section { display: none; width: 100%; text-align: center; }
        .active { display: block; }

        .placeholder-box { border: 2px dashed #666; padding: 50px; border-radius: 10px; }
    </style>
</head>
<body>

<nav>
    <h2>Mes Jeux</h2>
    <ul>
        <li onclick="showGame('ultimate-morpion')">Morpion Ultime</li>
        <li onclick="showGame('simple-morpion')">Morpion Simple</li>
        <li onclick="showGame('demineur')">Démineur</li>
        <li onclick="showGame('belote')">Belote</li>
        <li onclick="showGame('yams')">Yams</li>
    </ul>
</nav>

<main>
    <section id="ultimate-morpion" class="game-section">
        <h2>Morpion Ultime</h2>
        <div id="ultimate-container"></div>
    </section>

    <section id="simple-morpion" class="game-section">
        <h2>Morpion Classique</h2>
        <div class="placeholder-box">Grille 3x3 simple en cours de développement...</div>
    </section>

    <section id="demineur" class="game-section">
        <h2>Démineur</h2>
        <div class="placeholder-box">Attention aux bombes !</div>
    </section>

    <section id="belote" class="game-section">
        <h2>Belote</h2>
        <div class="placeholder-box">Jeu de cartes (Logique complexe)</div>
    </section>

    <section id="yams" class="game-section">
        <h2>Yams (Yahtzee)</h2>
        <div class="placeholder-box">Lancez les dés !</div>
    </section>
</main>

<script>
    function showGame(gameId) {
        // Cache toutes les sections
        document.querySelectorAll('.game-section').forEach(section => {
            section.classList.remove('active');
        });
        // Affiche la section demandée
        document.getElementById(gameId).classList.add('active');
    }

    // Affiche le premier par défaut
    showGame('ultimate-morpion');
</script>

</body>
</html>
