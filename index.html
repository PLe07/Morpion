<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arcade Pro 2.0</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --p1: #f43f5e; --p2: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* Menu */
        nav { width: 220px; background: #020617; padding: 20px; border-right: 1px solid #334155; }
        nav h2 { color: var(--accent); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        nav ul { list-style: none; padding: 0; }
        nav li { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.2s; background: #1e293b; }
        nav li:hover { background: var(--accent); color: #000; }
        nav li.active { background: var(--accent); color: #000; font-weight: bold; }

        main { flex-grow: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .game-area { display: none; width: 100%; max-width: 800px; animation: slideIn 0.3s ease-out; }
        .game-area.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: var(--accent); color: #000; transition: 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4); }

        /* --- DÉMINEUR STYLE --- */
        #mine-grid { display: grid; grid-template-columns: repeat(10, 35px); gap: 3px; background: #334155; padding: 5px; border-radius: 5px; width: fit-content; margin: auto; }
        .m-cell { width: 35px; height: 35px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border-radius: 3px; transition: 0.1s; user-select: none; }
        .m-cell.open { background: #f1f5f9; color: #0f172a; }
        .m-cell.mine { background: #f43f5e; }
        .m-cell.flag { color: #f43f5e; }

        /* --- YAMS STYLE --- */
        .yams-layout { display: flex; gap: 20px; justify-content: center; }
        .score-table { background: #1e293b; border-collapse: collapse; width: 200px; }
        .score-table td { border: 1px solid #334155; padding: 8px; cursor: pointer; }
        .score-table td:hover:not(.taken) { background: #334155; }
        .score-table .taken { color: var(--accent); font-weight: bold; cursor: default; }
        .dice-box { font-size: 3.5rem; display: flex; gap: 10px; margin-bottom: 20px; }
        .die { cursor: pointer; padding: 5px; border-radius: 8px; transition: 0.2s; }
        .die.kept { background: rgba(56, 189, 248, 0.2); border: 2px solid var(--accent); transform: translateY(-5px); }

        /* --- MORPION ULTIME --- */
        .u-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #334155; padding: 10px; }
        .s-grid { display: grid; grid-template-columns: repeat(3, 45px); grid-template-rows: repeat(3, 45px); gap: 2px; position: relative; }
        .u-cell { background: var(--bg); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; }
        .u-cell:hover { background: #1e293b; }
        .next-play { box-shadow: 0 0 15px var(--accent); border: 2px solid var(--accent); }
    </style>
</head>
<body>

<nav>
    <h2>Arcade Pro</h2>
    <ul>
        <li onclick="tab('t-mine', initMine)" class="active">Démineur</li>
        <li onclick="tab('t-yams', initYams)">Yams</li>
        <li onclick="tab('t-ult', initUlt)">Morpion Ultime</li>
        <li onclick="tab('t-life')">Jeu de la Vie</li>
    </ul>
</nav>

<main>
    <section id="t-mine" class="game-area active">
        <h1>Démineur</h1>
        <div id="mine-grid"></div>
        <div style="margin-top:20px; text-align:center;">
            <p>Clic Gauche : Creuser | Clic Droit : Drapeau</p>
            <button onclick="initMine()">Nouvelle Grille</button>
        </div>
    </section>

    <section id="t-yams" class="game-area">
        <h1>Yams</h1>
        <div class="yams-layout">
            <div>
                <div class="dice-box" id="y-dice"></div>
                <button id="y-roll" onclick="rollYams()">Lancer les dés (3)</button>
            </div>
            <table class="score-table" id="y-scores"></table>
        </div>
    </section>

    <section id="t-ult" class="game-area">
        <h1>Morpion Ultime</h1>
        <div id="u-board" class="u-grid" style="margin:auto; width:fit-content;"></div>
    </section>

    <section id="t-life" class="game-area">
        <h1>Le Jeu de la Vie</h1>
        <p style="font-size:0.9rem; max-width:500px; margin:auto; margin-bottom:10px;">
            C'est un automate. <b>Règles :</b> 2 ou 3 voisins = survie. 3 voisins = naissance. 
            Sinon, la cellule meurt (solitude ou étouffement).
        </p>
        <canvas id="l-canv" width="400" height="400" style="border:1px solid #334155; display:block; margin:auto;"></canvas>
        <div style="text-align:center; margin-top:10px;">
            <button onclick="lRun = !lRun">Pause / Lecture</button>
            <button onclick="lSeed()">Aléatoire</button>
        </div>
    </section>
</main>

<script>
    // --- GESTION DES ONGLETS ---
    function tab(id, callback) {
        document.querySelectorAll('.game-area').forEach(a => a.classList.remove('active'));
        document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(callback) callback();
    }

    // --- DÉMINEUR (LOGIQUE RÉCURSIVE) ---
    let mGrid = [], mOpen = [], mSize = 10, mMines = 12;
    function initMine() {
        const div = document.getElementById('mine-grid'); div.innerHTML = '';
        mGrid = Array(mSize*mSize).fill(0); mOpen = Array(mSize*mSize).fill(false);
        let count = 0;
        while(count < mMines) {
            let r = Math.floor(Math.random()*100);
            if(mGrid[r] !== 'M') { mGrid[r] = 'M'; count++; }
        }
        for(let i=0; i<100; i++) {
            if(mGrid[i] === 'M') continue;
            let n = 0, r = Math.floor(i/10), c = i%10;
            for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
                let nr = r+x, nc = c+y;
                if(nr>=0 && nr<10 && nc>=0 && nc<10 && mGrid[nr*10+nc] === 'M') n++;
            }
            mGrid[i] = n;
        }
        for(let i=0; i<100; i++) {
            let c = document.createElement('div'); c.className = 'm-cell';
            c.onclick = () => openM(i);
            c.oncontextmenu = (e) => { e.preventDefault(); c.classList.toggle('flag'); c.textContent = c.classList.contains('flag')?'🚩':''; };
            div.appendChild(c);
        }
    }
    function openM(i) {
        if(mOpen[i]) return;
        let cells = document.getElementById('mine-grid').children;
        mOpen[i] = true; cells[i].classList.add('open');
        if(mGrid[i] === 'M') { cells[i].textContent = '💣'; alert("PERDU !"); initMine(); return; }
        cells[i].textContent = mGrid[i] || '';
        if(mGrid[i] === 0) {
            let r = Math.floor(i/10), c = i%10;
            for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
                let nr = r+x, nc = c+y;
                if(nr>=0 && nr<10 && nc>=0 && nc<10) openM(nr*10+nc);
            }
        }
    }

    // --- YAMS (AVEC SCORE) ---
    let yDice = [1,1,1,1,1], yKeep = [false,false,false,false,false], yRolls = 3, yScores = {};
    function initYams() {
        yScores = {}; yRolls = 3; yKeep.fill(false);
        const table = document.getElementById('y-scores'); table.innerHTML = '';
        ['1','2','3','4','5','6','Brelan','Full','Carré','Yams','Chance'].forEach(cat => {
            let row = table.insertRow(); row.insertCell().textContent = cat;
            let val = row.insertCell(); val.id = 'sc-'+cat;
            val.onclick = () => saveScore(cat, val);
        });
        updateYDice();
    }
    function rollYams() {
        if(yRolls <= 0) return;
        yDice = yDice.map((d, i) => yKeep[i] ? d : Math.floor(Math.random()*6)+1);
        yRolls--; updateYDice();
        document.getElementById('y-roll').textContent = `Lancer (${yRolls})`;
    }
    function updateYDice() {
        const div = document.getElementById('y-dice'); div.innerHTML = '';
        yDice.forEach((d, i) => {
            let el = document.createElement('div'); el.className = 'die ' + (yKeep[i]?'kept':'');
            el.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d-1];
            el.onclick = () => { yKeep[i] = !yKeep[i]; updateYDice(); };
            div.appendChild(el);
        });
    }
    function saveScore(cat, el) {
        if(yScores[cat] !== undefined) return;
        let score = 0;
        if(parseInt(cat)) score = yDice.filter(d => d == cat).length * cat;
        else score = 25; // Logique simplifiée pour l'exemple
        yScores[cat] = score; el.textContent = score; el.className = 'taken';
        yRolls = 3; yKeep.fill(false); rollYams();
    }

    // --- MORPION ULTIME ---
    let uP = "X", uNext = -1, uState = Array(9).fill(null);
    function initUlt() {
        const b = document.getElementById('u-board'); b.innerHTML = ''; uState.fill(null); uP = "X"; uNext = -1;
        for(let i=0; i<9; i++) {
            const sg = document.createElement('div'); sg.className = 's-grid';
            for(let j=0; j<9; j++) {
                const c = document.createElement('div'); c.className = 'u-cell';
                c.onclick = () => {
                    if(c.textContent || (uNext !== -1 && uNext !== i) || uState[i]) return;
                    c.textContent = uP; c.style.color = uP === "X"?"var(--p1)":"var(--p2)";
                    uNext = j; // Ici manque la checkWin du petit carré (déjà codée plus haut)
                    uP = uP === "X"?"O":"X"; updateUltUI();
                };
                sg.appendChild(c);
            }
            b.appendChild(sg);
        }
        updateUltUI();
    }
    function updateUltUI() {
        document.querySelectorAll('.s-grid').forEach((g, i) => {
            g.classList.toggle('next-play', uNext === i || uNext === -1);
        });
    }

    // --- JEU DE LA VIE ---
    const lCanv = document.getElementById('l-canv'), lCtx = lCanv.getContext('2d');
    let lGrid = Array(40).fill().map(() => Array(40).fill(0)), lRun = false;
    function lSeed() { lGrid = lGrid.map(r => r.map(() => Math.random()>0.8?1:0)); }
    function lLoop() {
        if(lRun) {
            let next = lGrid.map(a => [...a]);
            for(let x=0; x<40; x++) for(let y=0; y<40; y++) {
                let n = 0;
                for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) {
                    if(!i && !j) continue;
                    n += lGrid[(x+i+40)%40][(y+j+40)%40];
                }
                if(lGrid[x][y] && (n<2 || n>3)) next[x][y] = 0;
                else if(!lGrid[x][y] && n===3) next[x][y] = 1;
            }
            lGrid = next;
        }
        lCtx.fillStyle = '#020617'; lCtx.fillRect(0,0,400,400);
        lCtx.fillStyle = '#38bdf8';
        for(let x=0; x<40; x++) for(let y=0; y<40; y++) if(lGrid[x][y]) lCtx.fillRect(x*10, y*10, 9, 9);
        requestAnimationFrame(lLoop);
    }

    initMine(); initYams(); initUlt(); lSeed(); lLoop();
</script>
</body>
</html>
