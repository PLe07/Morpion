<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arcade Ultimate v3</title>
    <style>
        :root { --bg: #050505; --card: #151515; --accent: #ffcc00; --text: #eee; --mine-hidden: #333; --mine-open: #ddd; }
        body { font-family: 'Ubuntu', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* Nav */
        nav { width: 220px; background: #000; padding: 20px; border-right: 2px solid var(--accent); }
        nav li { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; background: #111; transition: 0.3s; list-style: none; border-left: 0 solid var(--accent); }
        nav li:hover { background: #222; border-left: 5px solid var(--accent); }
        nav li.active { background: var(--accent); color: #000; font-weight: bold; }

        main { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; max-width: 1000px; }
        .screen.active { display: block; }

        /* DÉMINEUR XXL */
        #m-board { display: grid; grid-template-columns: repeat(20, 25px); gap: 2px; margin: auto; border: 4px solid #444; width: fit-content; }
        .m-tile { width: 25px; height: 25px; background: var(--mine-hidden); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; font-weight: bold; border-radius: 2px; }
        .m-tile.revealed { background: var(--mine-open); color: #000; }
        .m-tile.mine { background: #ff4444 !important; }

        /* YAMS MULTI */
        .yams-container { display: flex; gap: 20px; justify-content: space-around; flex-wrap: wrap; }
        .yams-table { background: #222; border-collapse: collapse; font-size: 0.8rem; }
        .yams-table td { border: 1px solid #444; padding: 5px 10px; }
        .potential { color: #888; font-style: italic; cursor: pointer; }
        .potential:hover { color: var(--accent); background: #333; }
        .final-score { color: var(--accent); font-weight: bold; }
        .dice-area { text-align: center; margin-bottom: 20px; background: #111; padding: 20px; border-radius: 15px; }

        /* BELOTE */
        .tapis { background: #005a00; width: 600px; height: 400px; border-radius: 100px; margin: 20px auto; position: relative; border: 8px solid #3e2723; }
        .hand { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .card { width: 60px; height: 90px; background: white; color: black; border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid #ccc; transition: 0.2s; }
        .card:hover { transform: translateY(-15px); border-color: var(--accent); }
        .card.red { color: red; }
    </style>
</head>
<body>

<nav>
    <h2 style="color:var(--accent)">ULTRA ARCADE</h2>
    <ul style="padding:0">
        <li onclick="switchT('s-mine', initM)" class="active">Démineur XXL</li>
        <li onclick="switchT('s-yams', initY)">Yams Multi</li>
        <li onclick="switchT('s-belo', initB)">Belote</li>
    </ul>
</nav>

<main>
    <section id="s-mine" class="screen active">
        <h1>Démineur Expert (20x20)</h1>
        <div id="m-board"></div>
        <div style="text-align:center; margin-top:10px;">
            <button onclick="initM()" style="background:var(--accent); border:none; padding:10px 20px; font-weight:bold; cursor:pointer;">Réinitialiser</button>
        </div>
    </section>

    <section id="s-yams" class="screen">
        <h1>Yams Multi-Joueurs</h1>
        <div class="dice-area">
            <div id="y-dice-display" style="font-size: 4rem; margin-bottom: 10px;">🎲 🎲 🎲 🎲 🎲</div>
            <button id="btn-roll" onclick="rollY()" style="padding:10px 30px; font-weight:bold;">Lancer (3)</button>
            <p id="y-turn-info">Tour du Joueur 1</p>
        </div>
        <div class="yams-container" id="y-tables"></div>
    </section>

    <section id="s-belo" class="screen">
        <h1>Belote (Table de Jeu)</h1>
        <div class="tapis" id="tapis-jeu">
            <div id="deck-center" style="position:absolute; top:40%; left:45%;"></div>
        </div>
        <div id="atout-display" style="text-align:center; font-size:1.5rem;">Atout : ?</div>
        <div class="hand" id="player-hand"></div>
    </section>
</main>

<script>
    function switchT(id, cb) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(cb) cb();
    }

    /* --- DEMINEUR EXPERT --- */
    let mGrid = [], mShown = [], firstC = true;
    function initM() {
        const b = document.getElementById('m-board'); b.innerHTML = '';
        mGrid = Array(400).fill(0); mShown = Array(400).fill(false); firstC = true;
        for(let i=0; i<400; i++) {
            let t = document.createElement('div'); t.className = 'm-tile';
            t.onclick = () => clickM(i);
            t.oncontextmenu = (e) => { e.preventDefault(); t.textContent = t.textContent==='🚩'?'':'🚩'; };
            b.appendChild(t);
        }
    }
    function clickM(i) {
        if(firstC) { placeM(i); firstC = false; }
        revealM(i);
    }
    function placeM(safeI) {
        let m = 0;
        while(m < 60) {
            let r = Math.floor(Math.random()*400);
            if(r !== safeI && mGrid[r] !== 'M') { mGrid[r] = 'M'; m++; }
        }
        for(let j=0; j<400; j++) {
            if(mGrid[j]==='M') continue;
            let count=0, r=Math.floor(j/20), c=j%20;
            for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
                let nr=r+x, nc=c+y;
                if(nr>=0 && nr<20 && nc>=0 && nc<20 && mGrid[nr*20+nc]==='M') count++;
            }
            mGrid[j] = count;
        }
    }
    function revealM(i) {
        if(mShown[i]) return;
        mShown[i] = true;
        let tiles = document.getElementById('m-board').children;
        tiles[i].classList.add('revealed');
        if(mGrid[i] === 'M') { 
            tiles[i].classList.add('mine'); tiles[i].textContent='💣'; 
            alert('GAME OVER'); initM(); 
        } else {
            tiles[i].textContent = mGrid[i] || '';
            if(mGrid[i] === 0) {
                let r=Math.floor(i/20), c=i%20;
                for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
                    let nr=r+x, nc=c+y;
                    if(nr>=0 && nr<20 && nc>=0 && nc<20) revealM(nr*20+nc);
                }
            }
        }
    }

    /* --- YAMS MULTI --- */
    let yD = [1,1,1,1,1], yK = [false,false,false,false,false], yR = 3, yP = 0, yScores = [{}, {}];
    function initY() {
        const cont = document.getElementById('y-tables'); cont.innerHTML = '';
        yScores.forEach((s, idx) => {
            let t = `<table class="yams-table" id="table-${idx}"><tr><th colspan="2">Joueur ${idx+1}</th></tr>`;
            ['1','2','3','4','5','6','Brelan','Carré','Full','Suite','Yams'].forEach(c => {
                t += `<tr><td>${c}</td><td class="y-val" data-cat="${c}">-</td></tr>`;
            });
            cont.innerHTML += t + `</table>`;
        });
        updateY();
    }
    function rollY() {
        if(yR <= 0) return;
        yD = yD.map((d,i) => yK[i] ? d : Math.floor(Math.random()*6)+1);
        yR--; updateY();
    }
    function updateY() {
        const disp = document.getElementById('y-dice-display'); disp.innerHTML = '';
        yD.forEach((d,i) => {
            let s = document.createElement('span'); s.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d-1];
            s.style.cursor = 'pointer'; s.style.color = yK[i] ? 'var(--accent)' : 'white';
            s.onclick = () => { yK[i] = !yK[i]; updateY(); };
            disp.appendChild(s);
        });
        document.getElementById('btn-roll').textContent = `Lancer (${yR})`;
        calcPotential();
    }
    function calcPotential() {
        const rows = document.querySelectorAll(`#table-${yP} .y-val`);
        rows.forEach(r => {
            const cat = r.dataset.cat;
            if(yScores[yP][cat] !== undefined) return;
            let p = 0;
            if(!isNaN(cat)) p = yD.filter(x => x == cat).length * cat;
            if(cat === 'Yams' && new Set(yD).size === 1) p = 50;
            // (Logique complète simplifiée pour l'espace...)
            r.innerHTML = `<span class="potential" onclick="lockY('${cat}', ${p})">${p}</span>`;
        });
    }
    function lockY(cat, p) {
        yScores[yP][cat] = p;
        document.querySelector(`#table-${yP} [data-cat="${cat}"]`).innerHTML = `<span class="final-score">${p}</span>`;
        yP = (yP + 1) % 2; yR = 3; yK.fill(false); rollY();
        document.getElementById('y-turn-info').textContent = `Tour du Joueur ${yP+1}`;
    }

    /* --- BELOTE --- */
    function initB() {
        const h = document.getElementById('player-hand'); h.innerHTML = '';
        const cards = ['7','8','9','10','V','D','R','A'];
        const cols = [{s:'♠',c:'black'},{s:'♣',c:'black'},{s:'♥',c:'red'},{s:'♦',c:'red'}];
        document.getElementById('atout-display').textContent = "Atout : " + cols[Math.floor(Math.random()*4)].s;
        for(let i=0; i<8; i++) {
            let rCol = cols[Math.floor(Math.random()*4)];
            let c = document.createElement('div'); c.className = 'card ' + (rCol.c==='red'?'red':'');
            c.innerHTML = `<div>${cards[Math.floor(Math.random()*8)]}</div><div>${rCol.s}</div>`;
            c.onclick = () => { document.getElementById('tapis-jeu').appendChild(c); c.style.position='absolute'; c.style.top='40%'; c.style.left='45%'; };
            h.appendChild(c);
        }
    }

    initM(); initY(); initB();
</script>
</body>
</html>
