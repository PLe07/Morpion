<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arcade Master Finale</title>
    <style>
        :root { --accent: #00ff88; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Navigation latérale */
        nav { width: 220px; background: #020617; padding: 20px; border-right: 2px solid var(--accent); flex-shrink: 0; }
        nav h2 { color: var(--accent); text-transform: uppercase; font-size: 1.2rem; margin-bottom: 30px; }
        nav ul { list-style: none; padding: 0; }
        nav li { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; background: #1e293b; transition: 0.2s; border: 1px solid transparent; }
        nav li:hover { border-color: var(--accent); background: #334155; }
        nav li.active { background: var(--accent); color: #020617; font-weight: bold; }

        /* Conteneur principal */
        main { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; max-width: 900px; text-align: center; }
        .screen.active { display: block; }

        /* GRILLES GÉNÉRALES */
        .grid-box { display: inline-grid; gap: 5px; background: #334155; padding: 10px; border-radius: 8px; }
        .cell { width: 60px; height: 60px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; font-weight: bold; border-radius: 4px; }
        
        /* MORPION ULTIME */
        .u-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: #475569; padding: 10px; }
        .s-grid { display: grid; grid-template-columns: repeat(3, 40px); gap: 2px; position: relative; padding: 5px; background: #1e293b; }
        .u-cell { width: 40px; height: 40px; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        .active-zone { outline: 3px solid var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* DÉMINEUR XXL */
        #m-board { display: grid; grid-template-columns: repeat(20, 25px); gap: 1px; background: #444; margin: auto; }
        .m-tile { width: 25px; height: 25px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; }
        .m-tile.open { background: #cbd5e1; color: #020617; }
        .m-tile.mine { background: #ef4444; }

        /* BELOTE */
        .tapis { background: #065f46; width: 500px; height: 350px; border-radius: 100px; margin: 20px auto; position: relative; border: 10px solid #451a03; }
        .slot { position: absolute; width: 60px; height: 85px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 5px; }
        #s-nord { top: 20px; left: 220px; } #s-sud { bottom: 20px; left: 220px; }
        #s-ouest { left: 40px; top: 130px; } #s-est { right: 40px; top: 130px; }
        .card { width: 60px; height: 85px; background: white; color: black; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .red { color: #ef4444; }
    </style>
</head>
<body>

<nav>
    <h2>Arcade v5</h2>
    <ul id="menu">
        <li onclick="changeTab('tab-sim')" class="active">Morpion Simple</li>
        <li onclick="changeTab('tab-ult')">Morpion Ultime</li>
        <li onclick="changeTab('tab-mine')">Démineur XXL</li>
        <li onclick="changeTab('tab-yams')">Yams</li>
        <li onclick="changeTab('tab-belo')">La Belote</li>
    </ul>
</nav>

<main>
    <section id="tab-sim" class="screen active">
        <h1>Morpion Classique</h1>
        <div id="sim-board" class="grid-box" style="grid-template-columns: repeat(3, 60px);"></div>
        <br><button onclick="initSim()" style="margin-top:20px; padding:10px;">Reset</button>
    </section>

    <section id="tab-ult" class="screen">
        <h1>Morpion Ultime</h1>
        <div id="ult-board" class="u-grid" style="margin: auto; width: fit-content;"></div>
    </section>

    <section id="tab-mine" class="screen">
        <h1>Démineur (Expert 20x20)</h1>
        <div id="m-board"></div>
        <p>Clic droit pour les drapeaux 🚩</p>
    </section>

    <section id="tab-yams" class="screen">
        <h1>Yams (Multi-Score)</h1>
        <div id="y-dice" style="font-size: 4rem; margin: 20px;">🎲🎲🎲🎲🎲</div>
        <button onclick="rollDice()" id="roll-btn">Lancer (3)</button>
        <div id="y-scores" style="display:flex; gap:20px; justify-content:center; margin-top:20px;"></div>
    </section>

    <section id="tab-belo" class="screen">
        <h1>Belote (Table de Jeu)</h1>
        <div class="tapis">
            <div id="s-nord" class="slot"></div><div id="s-sud" class="slot"></div>
            <div id="s-est" class="slot"></div><div id="s-ouest" class="slot"></div>
        </div>
        <div id="p-hand" style="display:flex; gap:8px; justify-content:center; margin-top:20px;"></div>
        <button onclick="initB()" style="margin-top:10px;">Nouvelle Donne</button>
    </section>
</main>

<script>
    // --- NAVIGATION ---
    function changeTab(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        // Initialiseurs spécifiques
        if(id === 'tab-sim') initSim();
        if(id === 'tab-ult') initUlt();
        if(id === 'tab-mine') initMine();
        if(id === 'tab-yams') initYams();
        if(id === 'tab-belo') initB();
    }

    // --- MORPION SIMPLE ---
    let sTurn = "X", sState = Array(9).fill(null);
    function initSim() {
        const b = document.getElementById('sim-board'); b.innerHTML = ''; sState.fill(null);
        for(let i=0; i<9; i++) {
            const c = document.createElement('div'); c.className = 'cell';
            c.onclick = () => { if(sState[i]) return; sState[i]=sTurn; c.textContent=sTurn; sTurn=sTurn==="X"?"O":"X"; };
            b.appendChild(c);
        }
    }

    // --- MORPION ULTIME ---
    let uP = "X", uNext = -1, uBig = Array(9).fill(null);
    function initUlt() {
        const b = document.getElementById('ult-board'); b.innerHTML = ''; uBig.fill(null); uP="X"; uNext=-1;
        for(let i=0; i<9; i++) {
            const sg = document.createElement('div'); sg.className = 's-grid';
            for(let j=0; j<9; j++) {
                const c = document.createElement('div'); c.className = 'u-cell';
                c.onclick = () => {
                    if(c.textContent || (uNext !== -1 && uNext !== i) || uBig[i]) return;
                    c.textContent = uP; c.style.color = uP==="X"?"#f43f5e":"#3b82f6";
                    uNext = j; uP = uP==="X"?"O":"X";
                    document.querySelectorAll('.s-grid').forEach((g,idx) => g.classList.toggle('active-zone', uNext === idx || uNext === -1));
                };
                sg.appendChild(c);
            }
            b.appendChild(sg);
        }
    }

    // --- DÉMINEUR XXL (20x20) ---
    let mGrid = [], firstClick = true;
    function initMine() {
        const b = document.getElementById('m-board'); b.innerHTML = ''; mGrid = Array(400).fill(0); firstClick = true;
        for(let i=0; i<400; i++) {
            const t = document.createElement('div'); t.className = 'm-tile';
            t.onclick = () => {
                if(firstClick) { generateMines(i); firstClick = false; }
                revealTile(i);
            };
            t.oncontextmenu = (e) => { e.preventDefault(); t.textContent = t.textContent==='🚩'?'':'🚩'; };
            b.appendChild(t);
        }
    }
    function generateMines(safe) {
        let m = 0; while(m < 60) {
            let r = Math.floor(Math.random()*400);
            if(r !== safe && mGrid[r] !== 'M') { mGrid[r] = 'M'; m++; }
        }
        for(let i=0; i<400; i++) {
            if(mGrid[i]==='M') continue;
            let count=0, r=Math.floor(i/20), c=i%20;
            for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
                let nr=r+x, nc=c+y;
                if(nr>=0 && nr<20 && nc>=0 && nc<20 && mGrid[nr*20+nc]==='M') count++;
            }
            mGrid[i] = count;
        }
    }
    function revealTile(i) {
        let tiles = document.getElementById('m-board').children;
        if(tiles[i].classList.contains('open')) return;
        tiles[i].classList.add('open');
        if(mGrid[i] === 'M') { tiles[i].classList.add('mine'); tiles[i].textContent='💣'; alert('BOOM'); initMine(); }
        else {
            tiles[i].textContent = mGrid[i] || '';
            if(mGrid[i] === 0) {
                let r=Math.floor(i/20), c=i%20;
                for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
                    let nr=r+x, nc=c+y; if(nr>=0 && nr<20 && nc>=0 && nc<20) revealTile(nr*20+nc);
                }
            }
        }
    }

    // --- YAMS ---
    let dice = [1,1,1,1,1], rolls = 3;
    function initYams() {
        rolls = 3; document.getElementById('y-scores').innerHTML = 'Tableau prêt. Lancez !';
    }
    function rollDice() {
        if(rolls <= 0) return;
        dice = dice.map(() => Math.floor(Math.random()*6)+1);
        rolls--;
        document.getElementById('y-dice').textContent = dice.map(d => ['⚀','⚁','⚂','⚃','⚄','⚅'][d-1]).join(' ');
        document.getElementById('roll-btn').textContent = `Lancer (${rolls})`;
        // Simule les points potentiels
        document.getElementById('y-scores').innerHTML = `Brelan : ${dice[0]*3} | Full : 25 | Yams : 50`;
    }

    // --- BELOTE ---
    function initB() {
        const hand = document.getElementById('p-hand'); hand.innerHTML = '';
        const suits = ['♠','♣','♥','♦']; const ranks = ['7','8','9','10','V','D','R','A'];
        document.querySelectorAll('.slot').forEach(s => s.innerHTML = '');
        for(let i=0; i<8; i++) {
            let s = suits[Math.floor(Math.random()*4)];
            let c = document.createElement('div'); c.className = `card ${s==='♥'||s==='♦'?'red':''}`;
            c.innerHTML = ranks[Math.floor(Math.random()*8)] + '<br>' + s;
            c.onclick = () => {
                document.getElementById('s-sud').appendChild(c);
                setTimeout(() => {
                    ['nord','est','ouest'].forEach(pos => {
                        let bc = document.createElement('div'); bc.className = 'card'; bc.style.background = '#444';
                        document.getElementById('s-'+pos).appendChild(bc);
                    });
                    setTimeout(() => document.querySelectorAll('.slot').forEach(s => s.innerHTML=''), 1500);
                }, 500);
            };
            hand.appendChild(c);
        }
    }

    // Lancer par défaut
    initSim();
</script>
</body>
</html>
