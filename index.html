<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Ultimate 2026</title>
    <style>
        :root { --accent: #00ff88; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Navigation */
        nav { width: 240px; background: #020617; padding: 20px; border-right: 2px solid var(--accent); flex-shrink: 0; z-index: 100; }
        nav h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-size: 1.2rem; }
        nav ul { list-style: none; padding: 0; }
        nav li { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; background: #1e293b; transition: 0.2s; border: 1px solid transparent; }
        nav li:hover { border-color: var(--accent); background: #334155; }
        nav li.active { background: var(--accent); color: #020617; font-weight: bold; }

        /* Contenu */
        main { flex-grow: 1; position: relative; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .screen { display: none; width: 100%; max-width: 900px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Utilitaires */
        h1 { color: var(--accent); margin-top: 0; }
        button { padding: 10px 20px; background: var(--accent); border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: #020617; transition: 0.2s; }
        button:hover { transform: scale(1.05); }

        /* --- MORPIONS --- */
        .grid-sim { display: grid; grid-template-columns: repeat(3, 100px); gap: 8px; margin: 20px auto; }
        .u-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; background: #334155; padding: 12px; border-radius: 8px; }
        .s-grid { display: grid; grid-template-columns: repeat(3, 45px); gap: 3px; background: #1e293b; padding: 5px; position: relative; }
        .cell { width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; font-weight: bold; min-height: 45px; }
        .cell-big { height: 100px; font-size: 3rem; border: 2px solid #334155; border-radius: 8px; }
        .active-zone { outline: 4px solid var(--accent); box-shadow: 0 0 20px var(--accent); z-index: 5; }

        /* --- DÉMINEUR XXL --- */
        #m-board { display: grid; grid-template-columns: repeat(20, 28px); gap: 1px; background: #444; margin: auto; border: 2px solid #444; }
        .m-tile { width: 28px; height: 28px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; cursor: pointer; font-weight: bold; user-select: none; }
        .m-tile.open { background: #cbd5e1; color: #020617; }
        .m-tile.mine { background: #f43f5e; }

        /* --- YAMS --- */
        .dice-container { font-size: 4rem; display: flex; gap: 15px; margin: 20px 0; justify-content: center; }
        .die { cursor: pointer; transition: 0.2s; padding: 5px; border-radius: 10px; }
        .die.kept { color: var(--accent); transform: translateY(-10px); }
        .yams-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; }
        .yams-table td { border: 1px solid #334155; padding: 12px; cursor: pointer; text-align: left; }
        .yams-table td.val { text-align: right; font-weight: bold; width: 60px; }
        .yams-table .potential { color: #64748b; font-style: italic; }
        .yams-table .taken { color: var(--accent); }

        /* --- BELOTE --- */
        .tapis { background: #065f46; width: 550px; height: 380px; border-radius: 120px; margin: 20px auto; position: relative; border: 10px solid #451a03; box-shadow: inset 0 0 60px rgba(0,0,0,0.5); }
        .slot { position: absolute; width: 70px; height: 100px; border: 2px dashed rgba(255,255,255,0.1); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        #sl-n { top: 20px; left: 240px; } #sl-s { bottom: 20px; left: 240px; }
        #sl-w { left: 40px; top: 140px; } #sl-e { right: 40px; top: 140px; }
        .card { width: 70px; height: 100px; background: white; color: black; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; box-shadow: 2px 4px 8px rgba(0,0,0,0.4); }
        .red { color: #f43f5e; }
    </style>
</head>
<body>

<nav>
    <h2>Arcade 2026</h2>
    <ul id="main-menu">
        <li data-target="tab-sim" class="active">Morpion Simple</li>
        <li data-target="tab-ult">Morpion Ultime</li>
        <li data-target="tab-mine">Démineur XXL</li>
        <li data-target="tab-yams">Yams Pro</li>
        <li data-target="tab-belo">Belote</li>
    </ul>
</nav>

<main>
    <section id="tab-sim" class="screen active">
        <h1>Morpion Simple</h1>
        <div id="sim-container" class="grid-sim"></div>
        <button onclick="initSim()">Réinitialiser</button>
    </section>

    <section id="tab-ult" class="screen">
        <h1>Morpion Ultime</h1>
        <div id="ult-container" class="u-grid"></div>
    </section>

    <section id="tab-mine" class="screen">
        <h1>Démineur Expert</h1>
        <div id="m-board"></div>
        <p>Indices : Clic gauche pour creuser, Clic droit pour 🚩</p>
        <button onclick="initMine()">Nouvelle Grille</button>
    </section>

    <section id="tab-yams" class="screen">
        <h1>Yams Multi</h1>
        <div class="dice-container" id="y-dice"></div>
        <button id="y-roll-btn" onclick="rollYams()">Lancer les dés (3)</button>
        <table class="yams-table" id="y-table"></table>
    </section>

    <section id="tab-belo" class="screen">
        <h1>Belote</h1>
        <div class="tapis">
            <div id="sl-n" class="slot"></div><div id="sl-s" class="slot"></div>
            <div id="sl-e" class="slot"></div><div id="sl-w" class="slot"></div>
        </div>
        <div id="b-hand" style="display:flex; gap:10px; justify-content:center; margin-top:30px;"></div>
        <button onclick="initB()" style="margin-top:20px;">Nouvelle Donne</button>
    </section>
</main>

<script>
/* --- SYSTÈME DE NAVIGATION PROPRE --- */
document.querySelectorAll('#main-menu li').forEach(li => {
    li.addEventListener('click', () => {
        document.querySelectorAll('#main-menu li').forEach(item => item.classList.remove('active'));
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        li.classList.add('active');
        const target = li.getAttribute('data-target');
        document.getElementById(target).classList.add('active');
        
        // Initialisation propre au switch
        if(target === 'tab-sim') initSim();
        if(target === 'tab-ult') initUlt();
        if(target === 'tab-mine') initMine();
        if(target === 'tab-yams') initYams();
        if(target === 'tab-belo') initB();
    });
});

/* --- MORPION SIMPLE --- */
function initSim() {
    const cont = document.getElementById('sim-container');
    cont.innerHTML = '';
    let player = "X";
    let state = Array(9).fill(null);
    for(let i=0; i<9; i++) {
        const c = document.createElement('div');
        c.className = 'cell cell-big';
        c.onclick = () => {
            if(state[i]) return;
            state[i] = player;
            c.textContent = player;
            c.style.color = player === "X" ? "var(--accent)" : "#3b82f6";
            if(checkWin(state)) { alert(player + " gagne !"); initSim(); }
            player = player === "X" ? "O" : "X";
        };
        cont.appendChild(c);
    }
}

/* --- MORPION ULTIME --- */
function initUlt() {
    const cont = document.getElementById('ult-container');
    cont.innerHTML = '';
    let player = "X", nextGrid = -1, bigState = Array(9).fill(null);
    for(let i=0; i<9; i++) {
        const sg = document.createElement('div');
        sg.className = 's-grid';
        sg.id = `sg-${i}`;
        for(let j=0; j<9; j++) {
            const c = document.createElement('div');
            c.className = 'cell';
            c.onclick = () => {
                if(c.textContent || (nextGrid !== -1 && nextGrid !== i) || bigState[i]) return;
                c.textContent = player;
                c.style.color = player === "X" ? "var(--accent)" : "#3b82f6";
                const cells = Array.from(sg.querySelectorAll('.cell')).map(el => el.textContent);
                if(checkWin(cells)) { bigState[i] = player; sg.style.background = "rgba(0,255,136,0.2)"; }
                nextGrid = (bigState[j] || isFull(Array.from(document.querySelectorAll(`#sg-${j} .cell`)))) ? -1 : j;
                player = player === "X" ? "O" : "X";
                updateUltUI(nextGrid, bigState);
            };
            sg.appendChild(c);
        }
        cont.appendChild(sg);
    }
    updateUltUI(-1, bigState);
}
function updateUltUI(next, big) {
    document.querySelectorAll('.s-grid').forEach((g, i) => {
        g.classList.remove('active-zone');
        if((next === -1 || next === i) && !big[i]) g.classList.add('active-zone');
    });
}

/* --- DÉMINEUR XXL --- */
let mGrid = [], mOpen = [], mFirst = true;
function initMine() {
    const board = document.getElementById('m-board'); board.innerHTML = '';
    mGrid = Array(400).fill(0); mOpen = Array(400).fill(false); mFirst = true;
    for(let i=0; i<400; i++) {
        const t = document.createElement('div'); t.className = 'm-tile';
        t.onclick = () => { if(mFirst) { setupMines(i); mFirst = false; } revealMine(i); };
        t.oncontextmenu = (e) => { e.preventDefault(); t.textContent = t.textContent === '🚩' ? '' : '🚩'; };
        board.appendChild(t);
    }
}
function setupMines(safe) {
    let m = 0; while(m < 60) {
        let r = Math.floor(Math.random()*400);
        if(r !== safe && mGrid[r] !== 'M') { mGrid[r] = 'M'; m++; }
    }
    for(let i=0; i<400; i++) {
        if(mGrid[i]==='M') continue;
        let n=0, r=Math.floor(i/20), c=i%20;
        for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
            let nr=r+x, nc=c+y; if(nr>=0&&nr<20&&nc>=0&&nc<20&&mGrid[nr*20+nc]==='M') n++;
        }
        mGrid[i] = n;
    }
}
function revealMine(i) {
    if(mOpen[i]) return;
    const tiles = document.getElementById('m-board').children;
    mOpen[i] = true; tiles[i].classList.add('open');
    if(mGrid[i] === 'M') { tiles[i].classList.add('mine'); tiles[i].textContent='💣'; alert('BOOM'); initMine(); }
    else {
        tiles[i].textContent = mGrid[i] || '';
        if(mGrid[i] === 0) {
            let r=Math.floor(i/20), c=i%20;
            for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
                let nr=r+x, nc=c+y; if(nr>=0&&nr<20&&nc>=0&&nc<20) revealMine(nr*20+nc);
            }
        }
    }
}

/* --- YAMS PRO --- */
let yDice = [1,1,1,1,1], yKeep = [false,false,false,false,false], yRolls = 3, yScores = {};
function initYams() {
    yScores = {}; yRolls = 3; yKeep.fill(false);
    const table = document.getElementById('y-table'); table.innerHTML = '';
    ['1','2','3','4','5','6','Brelan','Carré','Full','Suite','Yams'].forEach(cat => {
        let row = table.insertRow();
        row.insertCell().textContent = cat;
        let valCell = row.insertCell(); valCell.className = 'val'; valCell.id = `sc-${cat}`;
        valCell.onclick = () => lockYams(cat, valCell);
    });
    rollYams();
}
function rollYams() {
    if(yRolls <= 0) return;
    yDice = yDice.map((d, i) => yKeep[i] ? d : Math.floor(Math.random()*6)+1);
    yRolls--;
    updateYUI();
}
function updateYUI() {
    const cont = document.getElementById('y-dice'); cont.innerHTML = '';
    yDice.forEach((v, i) => {
        let d = document.createElement('div'); d.className = 'die' + (yKeep[i] ? ' kept' : '');
        d.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][v-1];
        d.onclick = () => { yKeep[i] = !yKeep[i]; updateYUI(); };
        cont.appendChild(d);
    });
    document.getElementById('y-roll-btn').textContent = `Lancer (${yRolls})`;
    calcPotentials();
}
function calcPotentials() {
    const counts = {}; yDice.forEach(v => counts[v] = (counts[v]||0)+1);
    const unique = Object.values(counts);
    ['1','2','3','4','5','6','Brelan','Carré','Full','Suite','Yams'].forEach(cat => {
        const el = document.getElementById(`sc-${cat}`);
        if(yScores[cat] !== undefined) return;
        let p = 0;
        if(!isNaN(cat)) p = (counts[cat] || 0) * parseInt(cat);
        else if(cat === 'Brelan' && unique.some(v => v >= 3)) p = yDice.reduce((a,b)=>a+b);
        else if(cat === 'Carré' && unique.some(v => v >= 4)) p = yDice.reduce((a,b)=>a+b);
        else if(cat === 'Full' && unique.includes(3) && unique.includes(2)) p = 25;
        else if(cat === 'Yams' && unique.includes(5)) p = 50;
        else if(cat === 'Suite' && (new Set(yDice).size >= 5 && (Math.max(...yDice)-Math.min(...yDice) === 4))) p = 40;
        el.textContent = p; el.className = 'val potential';
    });
}
function lockYams(cat, el) {
    if(yScores[cat] !== undefined) return;
    yScores[cat] = el.textContent; el.classList.remove('potential'); el.classList.add('taken');
    yRolls = 3; yKeep.fill(false); rollYams();
}

/* --- BELOTE --- */
function initB() {
    const h = document.getElementById('b-hand'); h.innerHTML = '';
    const suits = [{s:'♠',c:'b'},{s:'♣',c:'b'},{s:'♥',c:'r'},{s:'♦',c:'r'}];
    const ranks = ['7','8','9','10','V','D','R','A'];
    for(let i=0; i<8; i++) {
        let s = suits[Math.floor(Math.random()*4)];
        let r = ranks[Math.floor(Math.random()*8)];
        let c = document.createElement('div'); c.className = `card ${s.c==='r'?'red':''}`;
        c.innerHTML = `<span>${r}</span><span>${s.s}</span>`;
        c.onclick = () => {
            document.getElementById('sl-s').appendChild(c);
            setTimeout(() => {
                ['n','e','w'].forEach(p => {
                    let bc = document.createElement('div'); bc.className='card'; bc.style.background='#333';
                    document.getElementById('sl-'+p).innerHTML = ''; document.getElementById('sl-'+p).appendChild(bc);
                });
                setTimeout(() => document.querySelectorAll('.slot').forEach(sl => sl.innerHTML=''), 1000);
            }, 500);
        };
        h.appendChild(c);
    }
}

/* --- HELPERS --- */
function checkWin(g) {
    const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return w.some(p => g[p[0]] && g[p[0]] === g[p[1]] && g[p[0]] === g[p[2]]);
}
function isFull(arr) { return arr.every(c => c.textContent !== ""); }

// Lancement initial
initSim();
</script>
</body>
</html>
