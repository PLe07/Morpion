<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Ultimate 2026 - Polish Edition</title>
    <style>
        :root {
            --bg: #0b1120; --panel: #1e293b; --panel-hover: #334155;
            --accent: #10b981; --accent-glow: rgba(16, 185, 129, 0.4);
            --text: #f8fafc; --text-muted: #94a3b8;
            --p1: #f43f5e; --p2: #3b82f6;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* --- NOTIFICATION MODAL --- */
        #custom-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000;
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal-content { background: var(--panel); padding: 40px; border-radius: 15px; text-align: center; border: 2px solid var(--accent); box-shadow: 0 10px 40px var(--accent-glow); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-content h2 { margin-top: 0; font-size: 2rem; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- NAVIGATION --- */
        nav { width: 250px; background: #020617; padding: 25px; border-right: 1px solid #1e293b; flex-shrink: 0; display: flex; flex-direction: column; }
        nav h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 30px; font-size: 1.1rem; }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; background: var(--panel); transition: 0.2s; font-weight: 600; }
        nav li:hover { background: var(--panel-hover); transform: translateX(5px); }
        nav li.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-glow); }

        /* --- MAIN --- */
        main { flex-grow: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; position: relative; }
        .screen { display: none; width: 100%; max-width: 1000px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { text-align: center; margin-bottom: 10px; font-size: 2.2rem; }
        .btn { padding: 10px 20px; background: var(--accent); border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; color: #000; transition: 0.2s; }
        .btn:hover { transform: scale(1.05); }

        /* --- MORPION SIMPLE --- */
        .ms-grid { display: grid; grid-template-columns: repeat(3, 120px); gap: 10px; margin: 30px auto; width: fit-content; }
        .ms-cell { height: 120px; background: var(--panel); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .ms-cell:hover:not(.taken) { background: var(--panel-hover); }

        /* --- MORPION ULTIME --- */
        .mu-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; background: #0f172a; padding: 15px; border-radius: 15px; margin: 20px auto; width: fit-content; border: 2px solid #334155; }
        .mu-grid { display: grid; grid-template-columns: repeat(3, 45px); gap: 3px; background: var(--panel); padding: 5px; border-radius: 8px; position: relative; transition: 0.3s; }
        .mu-cell { height: 45px; background: var(--bg); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; cursor: pointer; }
        .mu-cell:hover:not(.taken) { background: var(--panel-hover); }
        .mu-active { outline: 3px solid var(--accent); background: #134e4a; box-shadow: 0 0 20px var(--accent-glow); animation: pulse 2s infinite; }
        .mu-won { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.85); display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: bold; border-radius: 8px; backdrop-filter: blur(2px); z-index: 10; }
        @keyframes pulse { 0% { outline-color: var(--accent); } 50% { outline-color: #34d399; } 100% { outline-color: var(--accent); } }

        /* --- DEMINEUR --- */
        .dm-header { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; }
        #dm-board { display: grid; grid-template-columns: repeat(20, 26px); gap: 1px; background: #334155; padding: 2px; border: 3px solid #334155; margin: auto; width: fit-content; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .dm-tile { width: 26px; height: 26px; background: var(--panel); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; cursor: pointer; user-select: none; border-radius: 2px; }
        .dm-tile:hover:not(.open) { background: var(--panel-hover); }
        .dm-tile.open { background: #cbd5e1; color: #000; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2); cursor: default; }
        .dm-tile.mine { background: var(--p1); font-size: 1.2rem; }
        .dm-c1 { color: #2563eb; } .dm-c2 { color: #16a34a; } .dm-c3 { color: #dc2626; } .dm-c4 { color: #7c3aed; }
        .dm-c5 { color: #991b1b; } .dm-c6 { color: #0d9488; } .dm-c7 { color: #000000; } .dm-c8 { color: #57534e; }

        /* --- YAMS (Intouché) --- */
        .yams-layout { display: flex; gap: 40px; justify-content: center; align-items: flex-start; margin-top: 20px; }
        .dice-area { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; }
        .dice-container { font-size: 4.5rem; display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; }
        .die { cursor: pointer; transition: 0.2s; user-select: none; }
        .die.kept { color: var(--accent); transform: translateY(-10px); }
        .yams-table { border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; }
        .yams-table th { padding: 12px; background: #020617; color: var(--text); }
        .yams-table td { border: 1px solid #334155; padding: 10px 15px; cursor: pointer; }
        .yams-table .pot { color: var(--text-muted); font-style: italic; }
        .yams-table .locked { color: var(--accent); font-weight: bold; background: rgba(16,185,129,0.1); }

        /* --- BELOTE (Placeholder) --- */
        .tapis { background: #064e3b; width: 600px; height: 400px; border-radius: 200px; margin: 20px auto; border: 12px solid #451a03; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="custom-modal">
    <div class="modal-content">
        <h2 id="modal-title">Titre</h2>
        <p id="modal-text" style="font-size: 1.2rem; margin-bottom: 20px;">Texte</p>
        <button class="btn" onclick="document.getElementById('custom-modal').style.display='none'; modalCallback();">Continuer</button>
    </div>
</div>

<nav>
    <h2>Arcade Hub</h2>
    <ul id="menu-list">
        <li data-target="t-sim" class="active">Morpion Simple</li>
        <li data-target="t-ult">Morpion Ultime</li>
        <li data-target="t-mine">Démineur Expert</li>
        <li data-target="t-yams">Yams Multi</li>
        <li data-target="t-belote">Belote (Bientôt)</li>
    </ul>
</nav>

<main>
    <section id="t-sim" class="screen active">
        <h1>Morpion 3x3</h1>
        <div id="sim-board" class="ms-grid"></div>
        <button class="btn" onclick="MorpionSimple.init()">Nouvelle Partie</button>
    </section>

    <section id="t-ult" class="screen">
        <h1>Morpion Ultime</h1>
        <p id="ult-info" style="font-size:1.2rem; font-weight:bold; margin-bottom:0;">Tour de : X</p>
        <div id="ult-board" class="mu-container"></div>
        <button class="btn" onclick="MorpionUltime.init()" style="margin-top:20px;">Recommencer</button>
    </section>

    <section id="t-mine" class="screen">
        <h1>Démineur (20x20)</h1>
        <div class="dm-header">
            <span>🚩 <span id="dm-flags">60</span></span>
            <span>⏱️ <span id="dm-time">0</span>s</span>
        </div>
        <div id="dm-board"></div>
        <button class="btn" onclick="Demineur.init()" style="margin-top:20px;">Nouvelle Grille</button>
    </section>

    <section id="t-yams" class="screen">
        <h1>Yams Multi-Joueurs</h1>
        <div class="yams-layout">
            <div class="dice-area">
                <div id="y-dice" class="dice-container"></div>
                <button id="y-roll-btn" class="btn" onclick="Yams.roll()">Lancer (3)</button>
                <p id="y-turn" style="margin-top:15px; font-weight:bold;"></p>
            </div>
            <div id="y-scores" style="display:flex; gap:15px;"></div>
        </div>
    </section>

    <section id="t-belote" class="screen">
        <h1>Belote</h1>
        <div class="tapis">En construction pour la V8...</div>
    </section>
</main>

<script>
let modalCallback = () => {};
function showModal(title, text, callback) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-title').style.color = title.includes('Victoire') || title.includes('Gagné') ? 'var(--accent)' : 'var(--p1)';
    document.getElementById('modal-text').textContent = text;
    modalCallback = callback || (() => {});
    document.getElementById('custom-modal').style.display = 'flex';
}

// --- NAVIGATION ---
document.querySelectorAll('#menu-list li').forEach(li => {
    li.onclick = () => {
        document.querySelectorAll('#menu-list li').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        li.classList.add('active');
        const t = li.dataset.target;
        document.getElementById(t).classList.add('active');
        if(t === 't-sim') MorpionSimple.init();
        if(t === 't-ult') MorpionUltime.init();
        if(t === 't-mine') Demineur.init();
        if(t === 't-yams') Yams.init();
    };
});

// --- MORPION SIMPLE ---
const MorpionSimple = {
    state: [], player: 'X',
    init() {
        const b = document.getElementById('sim-board'); b.innerHTML = '';
        this.state = Array(9).fill(null); this.player = 'X';
        for(let i=0; i<9; i++) {
            let c = document.createElement('div'); c.className = 'ms-cell';
            c.onclick = () => this.play(i, c);
            b.appendChild(c);
        }
    },
    play(i, el) {
        if(this.state[i]) return;
        this.state[i] = this.player; el.textContent = this.player;
        el.style.color = this.player === 'X' ? 'var(--p1)' : 'var(--p2)';
        el.classList.add('taken');
        if(this.check(this.state)) {
            setTimeout(() => showModal('Gagné !', `Le joueur ${this.player} a remporté la partie.`, () => this.init()), 100);
        } else if(!this.state.includes(null)) {
            setTimeout(() => showModal('Égalité', `Match nul, personne ne gagne.`, () => this.init()), 100);
        } else {
            this.player = this.player === 'X' ? 'O' : 'X';
        }
    },
    check(g) {
        const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        return w.some(l => g[l[0]] && g[l[0]] === g[l[1]] && g[l[0]] === g[l[2]]);
    }
};

// --- MORPION ULTIME ---
const MorpionUltime = {
    bigGrid: [], smallGrids: [], player: 'X', next: -1,
    init() {
        const b = document.getElementById('ult-board'); b.innerHTML = '';
        this.bigGrid = Array(9).fill(null);
        this.smallGrids = Array(9).fill().map(() => Array(9).fill(null));
        this.player = 'X'; this.next = -1;
        this.updateInfo();

        for(let i=0; i<9; i++) {
            let g = document.createElement('div'); g.className = 'mu-grid'; g.id = `mu-g-${i}`;
            for(let j=0; j<9; j++) {
                let c = document.createElement('div'); c.className = 'mu-cell';
                c.onclick = () => this.play(i, j, c);
                g.appendChild(c);
            }
            b.appendChild(g);
        }
        this.highlight();
    },
    play(bgIdx, smIdx, el) {
        if(this.smallGrids[bgIdx][smIdx] || this.bigGrid[bgIdx] || (this.next !== -1 && this.next !== bgIdx)) return;
        
        this.smallGrids[bgIdx][smIdx] = this.player;
        el.textContent = this.player; el.classList.add('taken');
        el.style.color = this.player === 'X' ? 'var(--p1)' : 'var(--p2)';

        if(MorpionSimple.check(this.smallGrids[bgIdx])) {
            this.bigGrid[bgIdx] = this.player;
            let over = document.createElement('div'); over.className = 'mu-won';
            over.textContent = this.player; over.style.color = this.player === 'X' ? 'var(--p1)' : 'var(--p2)';
            document.getElementById(`mu-g-${bgIdx}`).appendChild(over);
        } else if(!this.smallGrids[bgIdx].includes(null)) {
            this.bigGrid[bgIdx] = 'D'; // Draw
        }

        if(MorpionSimple.check(this.bigGrid.map(v => v === 'D' ? null : v))) {
            setTimeout(() => showModal('Victoire Ultime !', `Le joueur ${this.player} a conquis la grille.`, () => this.init()), 200);
            this.next = 999;
        } else {
            this.next = (this.bigGrid[smIdx]) ? -1 : smIdx;
            this.player = this.player === 'X' ? 'O' : 'X';
            this.updateInfo(); this.highlight();
        }
    },
    highlight() {
        document.querySelectorAll('.mu-grid').forEach((g, i) => {
            g.classList.remove('mu-active');
            if((this.next === -1 || this.next === i) && !this.bigGrid[i]) g.classList.add('mu-active');
        });
    },
    updateInfo() {
        const info = document.getElementById('ult-info');
        info.innerHTML = `Tour de : <span style="color:${this.player==='X'?'var(--p1)':'var(--p2)'}">${this.player}</span>`;
    }
};

// --- DEMINEUR EXPERT ---
const Demineur = {
    grid: [], open: [], flags: 60, time: 0, timer: null, first: true, totalMines: 60,
    init() {
        const b = document.getElementById('dm-board'); b.innerHTML = '';
        this.grid = Array(400).fill(0); this.open = Array(400).fill(false);
        this.flags = this.totalMines; this.time = 0; this.first = true;
        clearInterval(this.timer);
        document.getElementById('dm-flags').textContent = this.flags;
        document.getElementById('dm-time').textContent = this.time;

        for(let i=0; i<400; i++) {
            let t = document.createElement('div'); t.className = 'dm-tile';
            t.onmousedown = (e) => {
                if(e.button === 2) {
                    e.preventDefault();
                    if(this.open[i]) return;
                    if(t.textContent === '🚩') { t.textContent = ''; this.flags++; }
                    else if(this.flags > 0) { t.textContent = '🚩'; this.flags--; }
                    document.getElementById('dm-flags').textContent = this.flags;
                } else {
                    if(t.textContent === '🚩') return;
                    if(this.first) this.start(i);
                    this.reveal(i);
                }
            };
            t.oncontextmenu = e => e.preventDefault();
            b.appendChild(t);
        }
    },
    start(safeIdx) {
        this.first = false; let m = 0;
        const getAdj = (idx) => {
            let r=Math.floor(idx/20), c=idx%20, res=[];
            for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
                let nr=r+x, nc=c+y; if(nr>=0&&nr<20&&nc>=0&&nc<20) res.push(nr*20+nc);
            } return res;
        };
        const safeZone = [...getAdj(safeIdx), safeIdx];
        
        while(m < this.totalMines) {
            let r = Math.floor(Math.random()*400);
            if(!safeZone.includes(r) && this.grid[r] !== 'M') { this.grid[r] = 'M'; m++; }
        }
        for(let i=0; i<400; i++) {
            if(this.grid[i]==='M') continue;
            this.grid[i] = getAdj(i).filter(n => this.grid[n]==='M').length;
        }
        this.timer = setInterval(() => { this.time++; document.getElementById('dm-time').textContent = this.time; }, 1000);
    },
    reveal(i) {
        if(this.open[i]) return;
        const t = document.getElementById('dm-board').children[i];
        this.open[i] = true; t.classList.add('open');
        
        if(this.grid[i] === 'M') {
            t.classList.add('mine'); t.textContent = '💣'; clearInterval(this.timer);
            setTimeout(() => showModal('💥 BOUM !', 'Vous avez sauté sur une mine.', () => this.init()), 200);
        } else {
            if(this.grid[i] > 0) {
                t.textContent = this.grid[i];
                t.classList.add('dm-c' + this.grid[i]);
            }
            if(this.grid[i] === 0) {
                let r=Math.floor(i/20), c=i%20;
                for(let x=-1; x<=1; x++) for(let y=-1; y<=1; y++) {
                    let nr=r+x, nc=c+y; if(nr>=0&&nr<20&&nc>=0&&nc<20) this.reveal(nr*20+nc);
                }
            }
        }
    }
};

// --- YAMS (Totalement intouché selon ta demande) ---
const Yams = {
    dice: [1,1,1,1,1], kept: [false,false,false,false,false], rolls: 3, player: 0, scores: [{}, {}],
    init() {
        this.scores = [{}, {}]; this.player = 0; this.rolls = 3; this.kept.fill(false);
        const container = document.getElementById('y-scores'); container.innerHTML = '';
        for(let i=0; i<2; i++) {
            let table = `<table class="yams-table" id="yt-${i}"><tr><th colspan="2">Joueur ${i+1}</th></tr>`;
            ['1','2','3','4','5','6','Brelan','Carré','Full','Petite Suite','Grande Suite','Yams','Chance'].forEach(c => {
                table += `<tr><td>${c}</td><td class="val" id="y-${i}-${c.replace(/\s/g, '')}" onclick="Yams.lock('${c}', ${i})">-</td></tr>`;
            });
            table += `<tr><td style="font-weight:bold;color:var(--accent)">TOTAL</td><td style="font-weight:bold" id="y-tot-${i}">0</td></tr></table>`;
            container.innerHTML += table;
        }
        this.roll();
    },
    roll() {
        if(this.rolls <= 0) return;
        this.dice = this.dice.map((d, i) => this.kept[i] ? d : Math.floor(Math.random()*6)+1);
        this.rolls--; this.update();
    },
    update() {
        const box = document.getElementById('y-dice'); box.innerHTML = '';
        this.dice.forEach((d, i) => {
            let el = document.createElement('div'); el.className = 'die' + (this.kept[i]?' kept':'');
            el.textContent = ['⚀','⚁','⚂','⚃','⚄','⚅'][d-1];
            el.onclick = () => { this.kept[i] = !this.kept[i]; this.update(); };
            box.appendChild(el);
        });
        document.getElementById('y-roll-btn').textContent = `Lancer (${this.rolls})`;
        document.getElementById('y-turn').textContent = `Tour du Joueur ${this.player+1}`;
        this.calc();
    },
    calc() {
        const c = {}; this.dice.forEach(x => c[x] = (c[x]||0)+1);
        const vals = Object.values(c), s = new Set(this.dice);
        const hasSeq = (len) => { let st=0, mx=0; for(let i=1;i<=6;i++) { if(s.has(i)) st++; else st=0; mx=Math.max(mx,st); } return mx>=len; };
        ['1','2','3','4','5','6','Brelan','Carré','Full','Petite Suite','Grande Suite','Yams','Chance'].forEach(cat => {
            let cid = cat.replace(/\s/g, '');
            const el = document.getElementById(`y-${this.player}-${cid}`);
            if(this.scores[this.player][cat] !== undefined) return;
            let p = 0;
            if(!isNaN(cat)) p = (c[cat]||0) * parseInt(cat);
            else if(cat==='Brelan' && vals.some(v=>v>=3)) p = this.dice.reduce((a,b)=>a+b);
            else if(cat==='Carré' && vals.some(v=>v>=4)) p = this.dice.reduce((a,b)=>a+b);
            else if(cat==='Full' && vals.includes(3) && vals.includes(2)) p = 25;
            else if(cat==='Petite Suite' && hasSeq(4)) p = 30;
            else if(cat==='Grande Suite' && hasSeq(5)) p = 40;
            else if(cat==='Yams' && vals.includes(5)) p = 50;
            else if(cat==='Chance') p = this.dice.reduce((a,b)=>a+b);
            el.textContent = p; el.className = 'val pot';
        });
    },
    lock(cat, pIdx) {
        if(pIdx !== this.player || this.scores[pIdx][cat] !== undefined) return;
        let cid = cat.replace(/\s/g, '');
        const el = document.getElementById(`y-${pIdx}-${cid}`);
        let p = parseInt(el.textContent);
        this.scores[pIdx][cat] = p; el.className = 'val locked';
        document.getElementById(`y-tot-${pIdx}`).textContent = Object.values(this.scores[pIdx]).reduce((a,b)=>a+b, 0);
        this.player = (this.player + 1) % 2; this.rolls = 3; this.kept.fill(false);
        // Clean potentials for next player
        document.querySelectorAll('.pot').forEach(e => { e.textContent='-'; e.classList.remove('pot'); });
        this.roll();
    }
};

MorpionSimple.init();
</script>
</body>
</html>
